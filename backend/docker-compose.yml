services:
  deepparse_api:
    build:
      context: ./app
      dockerfile: Dockerfile
    hostname: deepparse_api
    container_name: deepparse_api
    environment:
      - HF_ENDPOINT=https://hf-mirror.com
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-pg123456}@gsk_pg:5432/${POSTGRES_DB:-gsk}
      - ES_HOST=http://es01:9200
      - ES_USERNAME=${ES_USERNAME:-elastic}
      - APP_ROOT_PATH=${APP_ROOT_PATH:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5181,http://127.0.0.1:5181,http://localhost:5173,http://127.0.0.1:5173}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - MAX_UPLOAD_SIZE_BYTES=${MAX_UPLOAD_SIZE_BYTES:-5242880}
      - ALLOWED_UPLOAD_EXTENSIONS=${ALLOWED_UPLOAD_EXTENSIONS:-.pdf,.docx,.txt,.md,.html,.json,.xlsx,.xls,.pptx,.ppt}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
      - ./app/key.txt
    ports:
      - "8000:8000"  # 只保留应用服务的端口映射
    volumes:
      - ./app:/app
    command: ["uvicorn", "app_main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    depends_on:
      - gsk_pg
      - es01
      - redis
    networks:
      - gsk_network

  es01:
    container_name: gsk-es-01
    image: m.daocloud.io/docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    volumes:
      - gsk_esdata01:/usr/share/elasticsearch/data
    env_file: .env
    environment:
      - node.name=es01
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - bootstrap.memory_lock=false
      - discovery.type=single-node
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - cluster.routing.allocation.disk.watermark.low=5gb
      - cluster.routing.allocation.disk.watermark.high=3gb
      - cluster.routing.allocation.disk.watermark.flood_stage=2gb
      - TZ=${TIMEZONE}
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    mem_limit: ${MEM_LIMIT}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl http://localhost:9200"]
      interval: 10s
      timeout: 10s
      retries: 120
    restart: on-failure
    networks:
      - gsk_network

  gsk_pg:
    container_name: gsk_pg
    image: m.daocloud.io/docker.io/library/postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-pg123456}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-gsk}
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - gsk_network

  redis:
    container_name: gsk_redis
    image: m.daocloud.io/docker.io/library/redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - gsk_network

volumes:
  gsk_esdata01:
    driver: local
  pg_data:
    driver: local
  redis_data:
    driver: local

networks:
  gsk_network:
    driver: bridge
